name: Build and deploy images

on:
  push:
    branches:
      - main
      - feat/**
    paths:
      - Dockerfile
      - Dockerfile.web
      - docker/**
      - server/**
      - apps/web/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .npmrc
      - .github/workflows/deploy-images.yml
  workflow_dispatch:

concurrency:
  group: multica-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/multica-backend
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/multica-web
  DEPLOY_PLATFORMS: linux/arm64

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed surfaces
        id: changes
        run: |
          backend=false
          web=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            backend=true
            web=true
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="$(git rev-list --max-parents=0 HEAD)"
            fi

            git diff --name-only "$base" "$GITHUB_SHA" > /tmp/changed.txt
            cat /tmp/changed.txt

            if grep -Eq '^(Dockerfile|docker/|server/|\.github/workflows/deploy-images\.yml$)' /tmp/changed.txt; then
              backend=true
            fi

            if grep -Eq '^(Dockerfile\.web|apps/web/|packages/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|turbo\.json$|\.npmrc$|\.github/workflows/deploy-images\.yml$)' /tmp/changed.txt; then
              web=true
            fi
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.web == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.web == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: steps.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.DEPLOY_PLATFORMS }}
          push: true
          cache-from: type=gha,scope=multica-backend
          cache-to: type=gha,mode=max,scope=multica-backend
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}

      - name: Build and push web image
        if: steps.changes.outputs.web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          platforms: ${{ env.DEPLOY_PLATFORMS }}
          push: true
          cache-from: type=gha,scope=multica-web
          cache-to: type=gha,mode=max,scope=multica-web
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_WS_URL=wss://task.seongjun.kr/ws
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:sha-${{ github.sha }}

      - name: Checkout homelab-gitops
        if: github.ref == 'refs/heads/main' && (steps.changes.outputs.backend == 'true' || steps.changes.outputs.web == 'true')
        uses: actions/checkout@v4
        with:
          repository: gmkseta/homelab-gitops
          token: ${{ secrets.HOMELAB_GITOPS_PAT }}
          path: homelab-gitops
          fetch-depth: 0

      - name: Update multica image tags in GitOps
        if: github.ref == 'refs/heads/main' && (steps.changes.outputs.backend == 'true' || steps.changes.outputs.web == 'true')
        env:
          BACKEND_CHANGED: ${{ steps.changes.outputs.backend }}
          WEB_CHANGED: ${{ steps.changes.outputs.web }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("homelab-gitops/apps/multica/kustomization.yaml")
          lines = path.read_text().splitlines()
          targets = {
              "ghcr.io/gmkseta/multica-backend": ("${{ env.BACKEND_CHANGED }}" == "true"),
              "ghcr.io/gmkseta/multica-web": ("${{ env.WEB_CHANGED }}" == "true"),
          }
          image_tag = "${{ env.IMAGE_TAG }}"

          for idx, line in enumerate(lines):
            stripped = line.strip()
            if not stripped.startswith("- name: "):
              continue
            image_name = stripped[len("- name: ") :]
            should_update = targets.get(image_name)
            if not should_update:
              continue
            for next_idx in range(idx + 1, min(idx + 4, len(lines))):
              if lines[next_idx].strip().startswith("newTag:"):
                lines[next_idx] = f"    newTag: {image_tag}"
                break
            else:
              raise SystemExit(f"newTag not found for {image_name}")

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Commit and push GitOps change
        if: github.ref == 'refs/heads/main' && (steps.changes.outputs.backend == 'true' || steps.changes.outputs.web == 'true')
        working-directory: homelab-gitops
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          if git diff --quiet -- apps/multica/kustomization.yaml; then
            echo "GitOps already points to sha-${SHORT_SHA}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/multica/kustomization.yaml
          git commit -m "chore: deploy multica images sha-${SHORT_SHA::7}"
          git pull --rebase origin main
          git push origin HEAD:main
