name: Build and deploy images (matrix)

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Dockerfile.web
      - docker/**
      - server/**
      - apps/web/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .npmrc
      - .github/workflows/deploy-images.yml
  workflow_dispatch:

concurrency:
  group: multica-images-${{ github.ref }}
  cancel-in-progress: true

permissions: { contents: read, packages: write }

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/multica-backend
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/multica-web
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Build backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=multica-backend-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=multica-backend-${{ matrix.suffix }}
      - name: Build web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.web
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}-${{ matrix.suffix }}
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_WS_URL=wss://task.seongjun.kr/ws
          cache-from: type=gha,scope=multica-web-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=multica-web-${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Backend manifest
        run: |
          docker buildx imagetools create -t ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}-amd64 \
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}-arm64
      - name: Web manifest
        run: |
          docker buildx imagetools create -t ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }} \
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}-amd64 \
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}-arm64

  deploy:
    needs: manifest
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: gmkseta/homelab-gitops
          token: ${{ secrets.HOMELAB_GITOPS_PAT }}
          fetch-depth: 0
      - name: Update tags
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("apps/multica/kustomization.yaml")
          lines = path.read_text().splitlines()
          targets = ["ghcr.io/gmkseta/multica-backend", "ghcr.io/gmkseta/multica-web"]
          tag = "${{ env.IMAGE_TAG }}"
          for idx, line in enumerate(lines):
              s = line.strip()
              if not s.startswith("- name: "):
                  continue
              name = s[len("- name: "):]
              if name in targets:
                  for j in range(idx + 1, min(idx + 5, len(lines))):
                      if lines[j].strip().startswith("newTag:"):
                          indent = lines[j][:len(lines[j]) - len(lines[j].lstrip())]
                          lines[j] = f"{indent}newTag: {tag}"
                          break
          path.write_text("\n".join(lines) + "\n")
          PY
      - name: Commit
        run: |
          git config user.name "homelab-bot"
          git config user.email "homelab-bot@seongjun.kr"
          git add .
          git diff --cached --quiet || (git commit -m "ci: bump multica images to ${{ env.IMAGE_TAG }}" && git push)
